name: Arkhe(n) Multi-Cloud CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  DOCKER_IMAGE: hyperspaceai/arkhen
  TZINOR_GATE_STRICT: true

jobs:
  build-and-verify:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22.x'
        cache: 'npm'
        
    - name: Install Dependencies
      run: npm ci
      
    - name: Verify Types & Lint
      run: npm run lint
      
    - name: Build Arkhe(n) Dashboard
      run: npm run build

  docker-publish:
    needs: build-and-verify
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v4
    - name: Build and Push Docker Image
      run: |
        echo "Simulating Docker build for $DOCKER_IMAGE:${{ github.sha }}"
        # docker build -t $DOCKER_IMAGE:${{ github.sha }} .
        # docker push $DOCKER_IMAGE:${{ github.sha }}

  deploy-aws-eks:
    needs: docker-publish
    runs-on: ubuntu-latest
    environment: production-aws
    steps:
    - name: Deploy to AWS EKS (Primary Tzinor Node)
      run: |
        echo "Applying manifests to AWS EKS..."
        echo "kubectl apply -f k8s/arkhen-deployment.yaml"
        echo "kubectl apply -f k8s/arkhen-network.yaml"

  deploy-gcp-gke:
    needs: docker-publish
    runs-on: ubuntu-latest
    environment: production-gcp
    steps:
    - name: Deploy to GCP GKE (Secondary Tzinor Node)
      run: |
        echo "Applying manifests to GCP GKE..."
        echo "kubectl apply -f k8s/arkhen-deployment.yaml"
        echo "kubectl apply -f k8s/arkhen-network.yaml"
