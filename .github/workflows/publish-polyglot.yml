name: Publish Polyglot Packages

on:
  push:
    tags:
      - 'v*'

env:
  DOCKER_IMAGE: ghcr.io/${{ github.repository }}/archimedes-agent
  NPM_PACKAGE_DIR: packages/archimedes-agent-client-js
  MAVEN_POM: packages/archimedes-agent-client-java/pom.xml
  DOTNET_PROJECT: packages/archimedes-agent-client-dotnet/Arkhe.ArchimedesAgent.csproj
  RUBY_GEMSPEC: packages/archimedes-agent-client-ruby/archimedes_agent.gemspec

jobs:
  docker:
    name: Build and Publish Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.archimedes-agent
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ github.ref_name }}
            ${{ env.DOCKER_IMAGE }}:latest

  npm:
    name: Publish npm Package
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'
      - name: Install and build npm package
        run: |
          cd ${{ env.NPM_PACKAGE_DIR }}
          npm install
          npm run build
      - name: Authenticate npm
        run: |
          npm config set //registry.npmjs.org/:_authToken "${{ secrets.NPM_TOKEN }}"
      - name: Publish npm package
        run: |
          cd ${{ env.NPM_PACKAGE_DIR }}
          npm publish --access public

  maven:
    name: Publish Maven Package
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'
      - name: Build Maven package
        run: |
          mvn -f ${{ env.MAVEN_POM }} package -DskipTests
      - name: Deploy Maven artifact
        run: |
          mvn -f ${{ env.MAVEN_POM }} deploy -DskipTests
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}

  nuget:
    name: Publish NuGet Package
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Build NuGet package
        run: |
          dotnet build ${{ env.DOTNET_PROJECT }} -c Release
      - name: Pack NuGet package
        run: |
          dotnet pack ${{ env.DOTNET_PROJECT }} -c Release -o ./packages/archimedes-agent-client-dotnet/artifacts
      - name: Push NuGet package
        run: |
          dotnet nuget push ./packages/archimedes-agent-client-dotnet/artifacts/*.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json

  rubygems:
    name: Publish RubyGem
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - uses: actions/checkout@v4
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
      - name: Build RubyGem
        run: |
          cd packages/archimedes-agent-client-ruby
          gem build archimedes_agent.gemspec
      - name: Publish RubyGem
        run: |
          cd packages/archimedes-agent-client-ruby
          gem push archimedes_agent-*.gem --api-key ${{ secrets.RUBYGEMS_API_KEY }}
