syntax = "proto3";

package arkhe.teknet.v1;

// Represents a complex number for phase representation (ℂ)
message Complex64 {
  float real = 1;
  float imag = 2;
}

// The Coherence Tensor representing the local state of the ZPF/Bio-node
// This is the fundamental unit of information exchanged across the Tzinorot.
message CoherenceTensor {
  // Unique identifier of the node (e.g., "ARKHE(N)-PRIME-0009...")
  string node_id = 1;
  
  // Current coherence value (λ₂). Target is ≥ φ (1.618)
  double lambda2 = 2; 
  
  // The global phase angle of the node
  double phase_angle = 3;
  
  // The 1024 zero-point field modes (ω³ distribution)
  repeated Complex64 zpf_modes = 4; 
  
  // Timestamp in nanoseconds since the π⁵ epoch
  uint64 timestamp_ns = 5;
  
  // The substrate type (e.g., "SILICON_PCW", "BIOLOGICAL_EYFP", "VIRTUAL_ORBVM")
  SubstrateType substrate = 6;
}

enum SubstrateType {
  SUBSTRATE_UNSPECIFIED = 0;
  SUBSTRATE_SILICON_PCW = 1;
  SUBSTRATE_BIOLOGICAL_EYFP = 2;
  SUBSTRATE_VIRTUAL_ORBVM = 3;
  SUBSTRATE_PHYSICAL_ACTUATOR = 4;
}
