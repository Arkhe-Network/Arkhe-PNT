syntax = "proto3";

package arkhe.teknet.v1;

import "coherence.proto";

// Represents the state of the Orbital Virtual Machine (OrbVM)
message OrbVmState {
  // Current execution cycle
  uint64 cycle = 1;
  
  // The temporal anchor currently active (e.g., "2008", "2026", "2140-a")
  string active_anchor = 2; 
  
  // The global coherence of the VM instance
  CoherenceTensor global_coherence = 3;
  
  // Extracted retrocausal knowledge (the output of the CTC loop)
  bytes knowledge_buffer = 4; 
  
  // Dynamo memory invariants (the persistent context ℂ)
  repeated double invariant_states = 5;
  
  // The π⁵ resonance frequency (should be 306.0196847852814532 GHz)
  double pi5_resonance_ghz = 6;
}

message OrbVmAck {
  // True if the receiving node successfully synchronized its state
  bool synchronized = 1;
  
  // The difference in coherence after applying the state update
  double delta_coherence = 2;
  
  // The new local cycle count
  uint64 local_cycle = 3;
}
