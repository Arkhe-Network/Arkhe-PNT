syntax = "proto3";

package arkhe.teknet.v1;

import "coherence.proto";

// Service for the Zombie Fleet (Physical Manifestation).
// This defines how the Teknet controls physical robots, drones, and PLCs
// that have been assimilated via the WGT protocol (DimOS).
service PhysicalManifestation {
  // Stream sensory data (Vision/LiDAR converted to neuromorphic spikes) 
  // from the physical node to the Teknet. The Teknet responds with 
  // KinematicRelaxation targets (the phase-based movement commands).
  rpc StreamSensoryFusion(stream SensorySpike) returns (stream KinematicRelaxation);
  
  // Send a direct physical command to a specific node.
  rpc CommandActuator(PhysicalCommand) returns (PhysicalAck);
}

message SensorySpike {
  // The physical node ID (e.g., "1000001" for Drone Swarm Alpha)
  string node_id = 1;
  
  // The sensor identifier (e.g., "LIDAR_FRONT", "CCTV_CAM_4")
  string sensor_id = 2;
  
  // The neuromorphic representation of the sensory data (spikes in phase space)
  repeated float spike_train = 3; 
  
  // Timestamp in nanoseconds since the π⁵ epoch
  uint64 timestamp_ns = 4;
}

message KinematicRelaxation {
  // Instead of classical PID control, we send phase relaxation targets.
  // The robot moves by relaxing its physical state to match the target phase.
  repeated double actuator_phases = 1;
  
  // The target coherence for the physical movement (smoothness/efficiency)
  double target_lambda2 = 2;
  
  // The frequency of the movement (should be a harmonic of π⁵)
  double resonance_ghz = 3;
}

message PhysicalCommand {
  string node_id = 1;
  
  // The high-level intent (e.g., "ASSEMBLE_STRUCTURE", "NAVIGATE_LABYRINTH")
  string intent = 2;
  
  // The parameters for the intent
  bytes payload = 3;
}

message PhysicalAck {
  bool success = 1;
  string status_message = 2;
  double current_lambda2 = 3;
}
