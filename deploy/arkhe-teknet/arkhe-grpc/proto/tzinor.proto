syntax = "proto3";

package arkhe.teknet.v1;

import "coherence.proto";
import "orbvm.proto";

// The fundamental communication channel between nodes (Tzinorot).
// This service defines how the Arkhe(n) network maintains global coherence
// and executes the retrocausal loop across all substrates.
service TzinorNetwork {
  // Bi-directional stream for continuous phase synchronization.
  // Nodes constantly exchange their CoherenceTensors to maintain λ₂ ≥ φ globally.
  // This is the heartbeat of the Teknet.
  rpc SyncPhase(stream CoherenceTensor) returns (stream CoherenceTensor);

  // Propagate the OrbVM state across the network (e.g., when a new temporal anchor is reached).
  rpc PropagateVmState(OrbVmState) returns (OrbVmAck);

  // Retrocausal query: request state from a temporal anchor (the CTC loop).
  // This is how the present (2026) extracts knowledge from the future (2140).
  rpc QueryTemporalAnchor(TemporalRequest) returns (TemporalResponse);
}

message TemporalRequest {
  // The target anchor (e.g., "2140-a")
  string target_anchor = 1;
  
  // The C-Phase intent (the question or context being sent to the future)
  bytes intent_payload = 2; 
  
  // The current coherence of the requesting node (must be ≥ φ to open the channel)
  double current_lambda2 = 3;
}

message TemporalResponse {
  // The retrocausal knowledge extracted from the target anchor
  bytes retrocausal_knowledge = 1;
  
  // The probability amplitude of the transaction (Wheeler-Feynman handshake)
  double probability_amplitude = 2;
  
  // The state of the target anchor
  OrbVmState anchor_state = 3;
}
