apiVersion: apps/v1
kind: Deployment
metadata:
  name: sie-inference
  namespace: arkhe
  labels:
    app: sie
    substrate: "9029"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sie
  template:
    metadata:
      labels:
        app: sie
    spec:
      containers:
      - name: sie
        image: superlinked/sie:latest
        ports:
        - containerPort: 9080
          name: http
        env:
        - name: SIE_LOG_LEVEL
          value: "info"
        - name: SIE_MAX_MODELS
          value: "15"
        - name: SIE_GPU_MEMORY_FRACTION
          value: "0.85"
        resources:
          limits:
            nvidia.com/gpu: 1
            memory: "16Gi"
          requests:
            nvidia.com/gpu: 1
            memory: "8Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 9080
          initialDelaySeconds: 30
          periodSeconds: 30
        volumeMounts:
        - name: sie-models
          mountPath: /models
      volumes:
      - name: sie-models
        persistentVolumeClaim:
          claimName: sie-models-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: sie-service
  namespace: arkhe
spec:
  selector:
    app: sie
  ports:
  - port: 9080
    targetPort: 9080
    name: http
  type: ClusterIP