version: '3.9'

services:
  # ═══════════════════════════════════════════════════════════════
  # CAMADA DE PERSISTÊNCIA — ARKHHE-CHAIN DATA LAYER
  # ═══════════════════════════════════════════════════════════════

  postgres-arkhe:
    image: postgres:15-alpine
    container_name: postgres-arkhe
    environment:
      POSTGRES_DB: arkhe_governance
      POSTGRES_USER: arkhe_admin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-arkhe_master_777}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata_arkhe:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arkhe_admin -d arkhe_governance"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - arkhe_net

  mongo-arkhe:
    image: mongo:7.0
    container_name: mongo-arkhe
    ports:
      - "${MONGO_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_DATABASE: arkhe_telemetry
    volumes:
      - mongo_arkhe_data:/data/db
      - ./docker/mongo/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - arkhe_net

  redis-arkhe:
    image: redis:7-alpine
    container_name: redis-arkhe
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_arkhe_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - arkhe_net

  # ═══════════════════════════════════════════════════════════════
  # CAMADA DE PROCESSAMENTO — CUDA KERNEL (PYTHON)
  # ═══════════════════════════════════════════════════════════════

  cuda-reconciler:
    build:
      context: ./arkhe-cuda
      dockerfile: Dockerfile
    container_name: cuda-reconciler
    environment:
      - NODE_COUNT=${NODE_COUNT:-144000}
      - REDIS_URL=redis://redis-arkhe:6379
      - GPU_DEVICE=${GPU_DEVICE:-0}
      - KERNEL_MODE=${KERNEL_MODE:-production}
      - DREAM_AWARE=${DREAM_AWARE:-true}
      - LOG_LEVEL=info
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu, compute, utility]
    ports:
      - "${CUDA_API_PORT:-5000}:5000"
    volumes:
      - cuda_logs:/var/log/arkhe
      - ./arkhe-cuda:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/v1/health"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - arkhe_net

  # ═══════════════════════════════════════════════════════════════
  # CAMADA DE ORQUESTRAÇÃO — NODE.JS BACKEND
  # ═══════════════════════════════════════════════════════════════

  node-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: node-backend
    depends_on:
      postgres-arkhe:
        condition: service_healthy
      mongo-arkhe:
        condition: service_healthy
      redis-arkhe:
        condition: service_healthy
      cuda-reconciler:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://arkhe_admin:${DB_PASSWORD:-arkhe_master_777}@postgres-arkhe:5432/arkhe_governance
      - MONGO_URI=mongodb://mongo-arkhe:27017/arkhe_telemetry
      - REDIS_URL=redis://redis-arkhe:6379
      - CUDA_SERVICE_URL=http://cuda-reconciler:5000
      - JWT_SECRET=${JWT_SECRET:-arkhe_sovereign_secret_change_in_prod}
      - PORT=3000
      - WS_PORT=3001
      - NODE_ENV=production
    ports:
      - "${NODE_API_PORT:-3000}:3000"
      - "${NODE_WS_PORT:-3001}:3001"
    volumes:
      - ./arkhe-chain-node:/app
      - ./docker/logs:/var/log/arkhe
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 45s
    restart: unless-stopped
    networks:
      - arkhe_net

  # ═══════════════════════════════════════════════════════════════
  # CAMADA DE BORDA — NGINX REVERSE PROXY
  # ═══════════════════════════════════════════════════════════════

  nginx-proxy:
    image: nginx:stable-alpine
    container_name: nginx-proxy
    depends_on:
      - node-backend
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - arkhe_net

volumes:
  pgdata_arkhe:
  mongo_arkhe_data:
  redis_arkhe_data:
  cuda_logs:
  nginx_certs:

networks:
  arkhe_net:
    driver: bridge
    name: arkhe_internal
