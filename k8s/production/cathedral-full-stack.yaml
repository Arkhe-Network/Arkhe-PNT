apiVersion: v1
kind: Namespace
metadata:
  name: arkhe
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cathedral-config
  namespace: arkhe
data:
  REDIS_HOST: "akasha-spine"
  LAMBDA_SOC: "0.015"
  TAU_THRESHOLD_PROMOTION: "0.95"
  TAU_THRESHOLD_DEMOTION: "0.85"
  ORACLE_MODEL: "llama3.2:3b"
---
apiVersion: v1
kind: Secret
metadata:
  name: cathedral-secrets
  namespace: arkhe
type: Opaque
stringData:
  NASA_MAP_KEY: "prod-key-placeholder"
  AIS_API_KEY: "prod-key-placeholder"
  ANTHROPIC_API_KEY: "prod-key-placeholder"
  EM_API_KEY: "prod-key-placeholder"
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: akasha-spine
  namespace: arkhe
spec:
  serviceName: "akasha-spine"
  replicas: 3
  selector:
    matchLabels:
      app: akasha-spine
  template:
    metadata:
      labels:
        app: akasha-spine
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        command: ["redis-server", "--maxmemory", "512mb", "--maxmemory-policy", "allkeys-lru"]
        ports:
        - containerPort: 6379
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: collector-geo
  namespace: arkhe
spec:
  selector:
    matchLabels:
      app: collector-geo
  template:
    metadata:
      labels:
        app: collector-geo
    spec:
      containers:
      - name: collector
        image: arkhe/geo-collector:v2.1
        envFrom:
        - configMapRef:
            name: cathedral-config
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: collector-mari
  namespace: arkhe
spec:
  selector:
    matchLabels:
      app: collector-mari
