apiVersion: v1
kind: ConfigMap
metadata:
  name: gamma-casimir-config
  namespace: arkhe
data:
  SQUADRON_ROLE: "vacuum-sensorium"
  PRIMARY_MODEL: "qwen-3"
  MODEL_RATIO: "0.6,0.3,0.1"
  LEASE_TTL: "5"
  ALLOWED_OPCODES: "0x0CC,0x229,0x22A,0x22B"
  METRICS_PORT: "9090"
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: gamma-casimir
  namespace: arkhe
  labels:
    squadron: gamma-casimir
    role: sensing
spec:
  serviceName: gamma-casimir
  replicas: 2
  selector:
    matchLabels:
      squadron: gamma-casimir
  template:
    metadata:
      labels:
        squadron: gamma-casimir
    spec:
      containers:
      - name: squadron
        image: cathedral/squadron-base:v1.0.0
        imagePullPolicy: IfNotPresent
        command: ["python", "-m", "squadron.main"]
        env:
        - name: SQUADRON_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: SPLITTER_ENDPOINT
          value: "splitter.arkhe.svc.cluster.local:50051"
        envFrom:
        - configMapRef:
            name: gamma-casimir-config
        ports:
        - containerPort: 50052
          name: grpc
        - containerPort: 9090
          name: metrics
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
---
apiVersion: v1
kind: Service
metadata:
  name: gamma-casimir
  namespace: arkhe
spec:
  selector:
    squadron: gamma-casimir
  ports:
  - port: 50052
    targetPort: 50052
    name: grpc
  - port: 9090
    targetPort: 9090
    name: metrics
