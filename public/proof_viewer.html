<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🜏 HLML Proof Viewer</title>
    <style>
        body {
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            background: #0A0E17;
            color: #E2E8F0;
            margin: 0;
            padding: 2rem;
        }
        h1 {
            color: #00FFAA;
            border-bottom: 1px solid #262E3D;
            padding-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        .step {
            border: 1px solid #262E3D;
            padding: 1.5rem;
            margin: 1rem 0;
            border-radius: 8px;
            background: #151B26;
            transition: transform 0.2s;
        }
        .step:hover {
            transform: translateX(5px);
        }
        .GREEN { border-left: 5px solid #00FFAA; }
        .YELLOW { border-left: 5px solid #FFD700; }
        .RED { border-left: 5px solid #FF5A1A; }
        .header {
            font-weight: bold;
            font-size: 1.2em;
            margin-bottom: 0.5rem;
        }
        .meta {
            font-size: 0.8rem;
            color: #64748B;
            margin-bottom: 1rem;
        }
        code {
            background: #0A0E17;
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            color: #00D4FF;
        }
        #file-input {
            margin-bottom: 2rem;
            background: #151B26;
            color: #E2E8F0;
            border: 1px solid #262E3D;
            padding: 0.5rem;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <h1>🜏 Proof Witness Log Viewer</h1>
    <input type="file" id="file-input" accept=".json">
    <div id="log-container">
        <p class="meta">Upload a <code>proof_log.json</code> to visualize the IR graph.</p>
    </div>

    <script>
        const fileInput = document.getElementById('file-input');
        const container = document.getElementById('log-container');

        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    renderLog(data);
                } catch (err) {
                    container.innerHTML = `<p style="color: #FF5A1A">Error parsing JSON: ${err.message}</p>`;
                }
            };
            reader.readAsText(file);
        });

        function renderLog(data) {
            container.innerHTML = '';
            data.forEach(step => {
                const div = document.createElement('div');
                div.className = `step ${step.status}`;
                div.innerHTML = `
                    <div class="header">${step.name}</div>
                    <div class="meta">Status: ${step.status}</div>
                    <div><b>Flow:</b> <code>${step.input_type}</code> &rarr; <code>${step.output_type}</code></div>
                    <div style="margin-top: 1rem;"><b>Tactic:</b> <code>${step.tactic_used}</code></div>
                `;
                container.appendChild(div);
            });
        }
    </script>
</body>
</html>
