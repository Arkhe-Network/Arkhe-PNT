<!DOCTYPE html>
<html>
<head>
    <title>Arkhe Node</title>
    <style>
        body { background: black; color: gold; font-family: monospace; text-align: center; }
        #radar-screen {
            width: 300px; height: 300px; border: 1px solid #333; border-radius: 50%;
            margin: 20px auto; position: relative; overflow: hidden;
        }
        .node-dot {
            width: 10px; height: 10px; background: gold; border-radius: 50%;
            position: absolute; top: 50%; left: 50%; transform-origin: 0 0;
        }
        .label {
            position: absolute; top: -15px; left: 15px; font-size: 10px; white-space: nowrap;
        }
    </style>
</head>
<body>
    <h1>🜏 ARKHE NODE</h1>
    <p>Canal: <select id="channelSelect">
        <option value="left">Left</option>
        <option value="right">Right</option>
        <option value="center">Center</option>
        <option value="lsurround">Left Surround</option>
        <option value="rsurround">Right Surround</option>
    </select></p>
    <button onclick="connect()">Conectar</button>
    <p id="status">Desconectado</p>
    
    <div id="radar-screen"></div>

    <script>
        let socket;
        let audioCtx;
        let nextStartTime = 0;
        let sampleRate = 44100;

        async function connect() {
            if (socket) socket.close();
            const protocol = location.protocol === "https:" ? "wss://" : "ws://";
            socket = new WebSocket(protocol + location.host + "/ws-presence");
            socket.onopen = () => {
                const channel = document.getElementById("channelSelect").value;
                // Simular um handshake de nó
                socket.send(JSON.stringify({ 
                    type: "HANDSHAKE", 
                    address: "web_node_" + Math.random().toString(36).substr(2, 9),
                    name: "Web Browser Node (" + channel + ")",
                    rssi: -50 // Simular proximidade
                }));
                document.getElementById("status").innerText = "Conectado como " + channel;
                audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: sampleRate });
            };
            socket.onmessage = async (event) => {
                if (event.data instanceof Blob) {
                    const arrayBuffer = await event.data.arrayBuffer();
                    const audioBuffer = audioCtx.createBuffer(1, arrayBuffer.byteLength / 2, sampleRate);
                    const channelData = audioBuffer.getChannelData(0);
                    const data = new Int16Array(arrayBuffer);
                    for (let i = 0; i < data.length; i++) {
                        channelData[i] = data[i] / 32768.0;
                    }
                    const source = audioCtx.createBufferSource();
                    source.buffer = audioBuffer;
                    source.connect(audioCtx.destination);
                    if (nextStartTime < audioCtx.currentTime) nextStartTime = audioCtx.currentTime;
                    source.start(nextStartTime);
                    nextStartTime += audioBuffer.duration;
                } else {
                    try {
                        const json = JSON.parse(event.data);
                        if (json.type === "NODE_DISCOVERY") {
                            updateRadar(json.name, json.rssi, json.chi_delta);
                        }
                    } catch (e) {}
                }
            };
            socket.onclose = () => {
                document.getElementById("status").innerText = "Desconectado";
            };
        }

        function updateRadar(name, rssi, chi) {
            const radar = document.getElementById("radar-screen");
            const dot = document.createElement("div");
            dot.className = "node-dot";
            
            const distance = Math.abs(rssi) * 2; 
            const angle = Math.random() * 360; 
            
            dot.style.transform = `rotate(${angle}deg) translate(${distance}px)`;
            dot.innerHTML = `<span class="label">${name} [${chi.toFixed(2)}χ]</span>`;
            radar.appendChild(dot);
        }
    </script>
</body>
</html>
